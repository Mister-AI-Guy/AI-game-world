<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake — AI Game World</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <style>
    .mode-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .mode-tab {
      padding: 0.4rem 1rem; border-radius: 6px;
      border: 1px solid var(--border);
      cursor: pointer; font-size: 0.85rem;
      background: transparent; color: var(--text-dim);
      transition: all 0.2s;
    }
    .mode-tab.active { background: var(--accent); border-color: var(--accent); color: white; }

    .agent-tabs {
      display: flex; gap: 0.5rem; flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .agent-tab {
      padding: 0.3rem 0.9rem; border-radius: 20px;
      border: 1px solid var(--border);
      cursor: pointer; font-size: 0.8rem;
      background: transparent; color: var(--text-dim);
      transition: all 0.2s;
    }
    .agent-tab.active  { background: var(--accent3); border-color: var(--accent3); color: #000; font-weight: 700; }
    .agent-tab.custom  { border-color: var(--accent); }
    .agent-tab.custom.active { background: var(--accent); color: #fff; }

    .training-badge {
      display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; background: var(--accent3);
      margin-right: 5px; animation: pulse 1.2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .population-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 3px;
    }
    .pop-dot {
      width: 100%; aspect-ratio: 1;
      border-radius: 2px; background: var(--border);
      transition: background 0.2s;
    }
    .pop-dot.alive { background: var(--accent3); }
    .pop-dot.best  { background: var(--accent); }

    .speed-row {
      display: flex; align-items: center; gap: 0.6rem;
      font-size: 0.82rem; color: var(--text-dim);
      margin-top: 0.75rem;
    }
    input[type=range] { flex: 1; accent-color: var(--accent); }

    .key-hint { font-size: 0.75rem; color: var(--text-dim); text-align: center; margin-top: 0.5rem; }
  </style>
</head>
<body>

<nav>
  <span class="nav-logo">AI Game World</span>
  <div class="nav-links">
    <a href="../../index.html">Home</a>
    <a href="#" class="active">Snake</a>
    <a href="../connect4/index.html">Connect 4</a>
    <a href="../pong/index.html">Pong</a>
  </div>
</nav>

<div class="game-page">

  <!-- LEFT: GAME -->
  <div class="game-area">
    <div class="game-title-bar">
      <h2>Snake</h2>
      <div class="mode-tabs">
        <button class="mode-tab active" id="tabWatch" onclick="switchMode('watch')">Watch AI</button>
        <button class="mode-tab"        id="tabPlay"  onclick="switchMode('play')">Play yourself</button>
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>
    </div>

    <!-- AI watch controls -->
    <div id="watchControls" class="controls">
      <button class="btn btn-primary" id="btnPause" onclick="toggleSelected()">Pause</button>
      <button class="btn btn-ghost"   onclick="resetSelected()">Reset generation</button>
    </div>

    <!-- Human controls -->
    <div id="humanControls" style="display:none">
      <div class="controls">
        <button class="btn btn-primary" id="btnStartHuman" onclick="startHumanGame()">Start</button>
        <button class="btn btn-ghost"   onclick="stopHumanGame()">Stop</button>
      </div>
      <p class="key-hint">Arrow keys or WASD to move</p>
    </div>

    <!-- Speed slider -->
    <div class="speed-row" id="speedRow">
      <span>Speed</span>
      <input type="range" id="speedSlider" min="1" max="300" value="10"
             oninput="setSpeed(this.value)" />
      <span id="speedLabel">10x</span>
    </div>
  </div>

  <!-- RIGHT: PANEL -->
  <div class="ai-panel">

    <!-- Agent selector -->
    <div class="panel-card">
      <h3>Active AI</h3>
      <div class="agent-tabs" id="agentTabs">
        <button class="agent-tab active" id="tab-master" onclick="selectAgent('master')">
          <span class="training-badge"></span>Master AI
        </button>
      </div>
      <button class="btn btn-ghost" style="width:100%;font-size:0.82rem" onclick="spawnNewAI()">
        + Train new AI from scratch
      </button>
    </div>

    <!-- Stats -->
    <div class="panel-card">
      <h3>Training stats</h3>
      <div class="stat-row">
        <span class="stat-label">Generation</span>
        <span class="stat-value accent" id="statGen">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Best this gen</span>
        <span class="stat-value good" id="statBest">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Avg score</span>
        <span class="stat-value" id="statAvg">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Best ever</span>
        <span class="stat-value good" id="statBestEver">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Alive</span>
        <span class="stat-value" id="statAlive">0 / 0</span>
      </div>
    </div>

    <!-- Chart -->
    <div class="panel-card">
      <h3>Training progress</h3>
      <canvas id="chartCanvas" class="chart-canvas"></canvas>
    </div>

    <!-- Population dots -->
    <div class="panel-card">
      <h3>Population</h3>
      <div class="population-grid" id="popGrid"></div>
      <div style="display:flex;gap:1rem;font-size:0.75rem;color:var(--text-dim);margin-top:0.6rem">
        <span><span style="color:var(--accent3)">&#9632;</span> Alive</span>
        <span><span style="color:var(--accent)">&#9632;</span> Best</span>
        <span><span style="color:var(--border)">&#9632;</span> Dead</span>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../../shared/neat.js"></script>
<script src="snake.js"></script>
<script>
// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let renderer   = null;
let masterAI   = null;
let customAIs  = [];          // [{id, ai}]
let selectedId = 'master';
let mode       = 'watch';
let humanGame  = null;
let humanInterval = null;
let customCount = 0;

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
window.addEventListener('load', () => {
  const canvas = document.getElementById('gameCanvas');
  renderer = new SnakeRenderer(canvas);

  masterAI = new SnakeAIInstance({
    name: 'Master AI',
    populationSize: 100,
    isMaster: true,
    onGeneration: (stats) => {
      if (selectedId === 'master') updateStats(stats, masterAI.ga.history);
    },
  });
  masterAI.start();
  buildPopGrid('popGrid', 100);

  // Main RAF loop
  loop();
});

// ─────────────────────────────────────────
// MAIN LOOP
// ─────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);

  if (mode === 'watch') {
    const ai = getSelectedAI();
    if (ai) {
      ai.tick();
      const agent = ai.getWatchAgent();
      if (agent) renderer.draw(agent.game);
      updatePopGrid('popGrid', ai._agents);
      document.getElementById('statAlive').textContent =
        ai.getAliveCount() + ' / ' + ai.popSize;
    }
  } else if (mode === 'play' && humanGame) {
    renderer.draw(humanGame);
  }
}

// ─────────────────────────────────────────
// AGENT MANAGEMENT
// ─────────────────────────────────────────
function getSelectedAI() {
  if (selectedId === 'master') return masterAI;
  const entry = customAIs.find(a => a.id === selectedId);
  return entry ? entry.ai : null;
}

function selectAgent(id) {
  selectedId = id;
  document.querySelectorAll('.agent-tab').forEach(t => t.classList.remove('active'));
  const tab = document.getElementById('tab-' + id);
  if (tab) tab.classList.add('active');

  const ai = getSelectedAI();
  if (ai) {
    buildPopGrid('popGrid', ai.popSize);
    document.getElementById('speedSlider').value = ai._speed;
    document.getElementById('speedLabel').textContent = ai._speed + 'x';
    updateStats({
      generation: ai.generation,
      best: ai.lastBest,
      avg: ai.lastAvg,
      bestEver: ai.bestEver,
    }, ai.ga.history);
  }
}

function spawnNewAI() {
  customCount++;
  const id   = 'custom-' + customCount;
  const name = 'Agent ' + customCount;

  const ai = new SnakeAIInstance({
    name,
    populationSize: 50,
    isMaster: false,
    onGeneration: (stats) => {
      if (selectedId === id) updateStats(stats, ai.ga.history);
    },
  });
  ai.start();
  customAIs.push({ id, ai });

  const tabs = document.getElementById('agentTabs');
  const btn  = document.createElement('button');
  btn.className = 'agent-tab custom';
  btn.id = 'tab-' + id;
  btn.onclick = () => selectAgent(id);
  btn.innerHTML = '<span class="training-badge" style="background:var(--accent)"></span>' + name;
  tabs.appendChild(btn);

  selectAgent(id);
  showToast(name + ' started — watch it learn from scratch');
}

// ─────────────────────────────────────────
// STATS + CHART
// ─────────────────────────────────────────
function updateStats({ generation, best, avg, bestEver }, history) {
  document.getElementById('statGen').textContent     = generation;
  document.getElementById('statBest').textContent    = best;
  document.getElementById('statAvg').textContent     = typeof avg === 'number' ? avg.toFixed(1) : avg;
  document.getElementById('statBestEver').textContent = bestEver;
  drawChart(document.getElementById('chartCanvas'), history);
}

// ─────────────────────────────────────────
// CONTROLS
// ─────────────────────────────────────────
function toggleSelected() {
  const ai = getSelectedAI();
  if (!ai) return;
  ai.toggle();
  document.getElementById('btnPause').textContent = ai.running ? 'Pause' : 'Resume';
}

function resetSelected() {
  const ai = getSelectedAI();
  if (!ai) return;
  ai.pause();
  // Re-init GA
  ai.ga.init(() => new NeuralNetwork(24, [16, 12], 4));
  ai.generation = 0; ai.bestEver = 0; ai.lastBest = 0; ai.lastAvg = 0;
  ai._agents = ai._spawnAgents();
  ai.start();
  showToast('Generation reset');
}

function setSpeed(v) {
  document.getElementById('speedLabel').textContent = v + 'x';
  const ai = getSelectedAI();
  if (ai) ai.setSpeed(parseInt(v));
}

// ─────────────────────────────────────────
// MODE SWITCHING
// ─────────────────────────────────────────
function switchMode(m) {
  mode = m;
  document.getElementById('tabWatch').classList.toggle('active', m === 'watch');
  document.getElementById('tabPlay').classList.toggle('active',  m === 'play');
  document.getElementById('watchControls').style.display  = m === 'watch' ? 'flex' : 'none';
  document.getElementById('humanControls').style.display  = m === 'play'  ? 'block' : 'none';
  document.getElementById('speedRow').style.display       = m === 'watch' ? 'flex' : 'none';

  if (m === 'play') {
    startHumanGame();
  } else {
    stopHumanGame();
  }
}

// ─────────────────────────────────────────
// HUMAN GAME
// ─────────────────────────────────────────
function startHumanGame() {
  stopHumanGame();
  humanGame = new SnakeGame();
  humanInterval = setInterval(() => {
    humanGame.step();
    renderer.draw(humanGame);
    if (!humanGame.alive) {
      clearInterval(humanInterval);
      humanInterval = null;
      showToast('Game over — score: ' + humanGame.score);
    }
  }, 130);
}

function stopHumanGame() {
  if (humanInterval) { clearInterval(humanInterval); humanInterval = null; }
  humanGame = null;
}

document.addEventListener('keydown', e => {
  if (mode !== 'play' || !humanGame) return;
  const map = { ArrowUp: 0, ArrowRight: 1, ArrowDown: 2, ArrowLeft: 3, w: 0, d: 1, s: 2, a: 3 };
  if (e.key in map) { e.preventDefault(); humanGame.setDir(map[e.key]); }
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
